name: 🐛 Bug report
description: Something is broken in the code or product
labels: ["kind:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please be specific — vague bug reports get closed.
        For security issues, do NOT use this template — see [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you do, what did you expect, what happened instead?
      placeholder: |
        Steps to reproduce:
        1. Go to /province/hcm/chat
        2. Ask "what's the bus fare to district 7?"
        3. Expected: cited verified-fact answer or "we don't know"
        4. Got: a confident hallucinated answer without citation
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - rag (retrieval)
        - persona (voice)
        - trust (citation / verification)
        - ui (rendering)
        - bilingual (EN/VI)
        - rate-limit / session
        - ingestion
        - cost / LLM
        - docs
        - other
    validations:
      required: true

  - type: dropdown
    id: province
    attributes:
      label: Affected province (if any)
      options:
        - hcm
        - hanoi
        - danang
        - hue
        - khanhhoa
        - lamdong
        - quangninh
        - angiang
        - haiphong
        - cantho
        - all / not province-specific

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Ubuntu 22 / Windows 11
        - Browser: Chrome 130 / Safari 17 / mobile Safari
        - Node: 20.x
        - Local supabase running? Y/N
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      render: shell
    validations:
      required: false
